<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>curt reyes · portfolio</title>
  <style>
    /* A walkable portfolio world (WebGL canvas + DOM text signs) that also EMBEDS the arche playground (a
       real <textarea> + <pre>, positioned at a world anchor to the left). #app is a full-viewport positioned
       container: the gfx host renders into the <canvas> inside it; the editor/screen hosts append their panels
       to it and the driver's `place` seams position them absolutely over the canvas as the world scrolls. */
    html, body { margin: 0; height: 100%; background: #12131c; overflow: hidden; }
    #app { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    #screen { display: block; width: 100vw; height: 100vh; }

    /* The world signs (text=dom) are <span>s in #text-layer that opt into pointer-events so they're
       selectable — but that swallows wheel/touch over them and breaks scroll-to-pan. Make them inert so
       the wheel/touch fall through to the gfx <canvas> underneath. */
    #text-layer span { pointer-events: none !important; }

    /* Playground panel: the DOM backends stack editor→output→button in a flex column. Re-lay it as a grid so
       the editor and output sit SIDE BY SIDE (shorter panel), let it size to content instead of the tall
       stacked height the arche layout forces, and nudge the whole panel up a bit. (These override the hosts'
       inline styles; the native window backend keeps its own stacked layout.) */
    #ui-panel {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "title  title"
        "editor output"
        "button button";
      gap: 0.6em !important;
      height: auto !important;
      align-content: start;
      transform: translateY(-14%);
    }
    #ui-panel-title { grid-area: title; }
    #ui-textedit { grid-area: editor; height: 15em !important; }
    #ui-textview {
      grid-area: output; height: 15em !important;
      min-height: 0 !important; max-height: none !important;
    }
    #ui-button { grid-area: button; justify-self: start; }
  </style>
</head>
<body>
  <div id="app"><canvas id="screen" data-status="idle" tabindex="0"></canvas></div>

  <!-- ONE wasm instance; archeRun merges every device host from portfolio.hosts.js (gfx + text + editor +
       screen + compiler). The compiler host runs arche-compile.wasm (WasiFS) + the compiled program (WasiShim)
       in-process; load wasi.js AFTER arche-web.js (both define a global WasiShim, the compiler host needs
       wasi.js's full one with .start()). -->
  <script src="analyzer/wasi-fs.js"></script>
  <script src="arche-web.js"></script>
  <script src="wasi.js"></script>
  <script src="portfolio.hosts.js"></script>
  <script>
    archeRun("portfolio.wasm", { root: document.getElementById("app") });
  </script>
</body>
</html>
