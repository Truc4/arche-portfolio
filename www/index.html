<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>curt reyes · portfolio</title>
  <style>
    /* A walkable portfolio world (WebGL canvas + DOM text signs) that also EMBEDS the arche playground (a
       real <textarea> + <pre>, positioned at a world anchor to the left). #app is a full-viewport positioned
       container: the gfx host renders into the <canvas> inside it; the editor/screen hosts append their panels
       to it and the driver's `place` seams position them absolutely over the canvas as the world scrolls. */
    /* `overflow: clip`, NOT `hidden`. A `hidden` box is still a SCROLL CONTAINER — it just has no visible
       scrollbars — so the browser is free to scroll it programmatically, and it does: the playground is a real
       off-screen <textarea>, and pressing an arrow key while it holds focus makes the browser scroll #app
       sideways to bring the focused element into view. That drags the <canvas> along with it, so its right
       edge lands in the middle of the screen as a hard vertical line, with the page background and the
       further-right DOM panels showing beyond it — and the player appears to hit an invisible wall there,
       because `clamp_player` clamps to the canvas width. `clip` is not a scroll container, so none of that
       can happen. The scroll seam below is a belt-and-braces reset for older engines that lack `clip`. */
    html, body { margin: 0; height: 100%; background: #12131c; overflow: clip; }
    #app { position: relative; width: 100vw; height: 100vh; overflow: clip; }
    #screen { display: block; width: 100vw; height: 100vh; }

    /* The world signs (text=dom) are <span>s in #text-layer that opt into pointer-events so they're
       selectable — but that swallows wheel/touch over them and breaks scroll-to-pan. Make them inert so
       the wheel/touch fall through to the gfx <canvas> underneath. (Web-only: native has no DOM text layer.)
       The playground's layout lives in the arche program (`layout` in portfolio.arche), not here. */
    #text-layer span { pointer-events: none !important; }
  </style>
</head>
<body>
  <div id="app"><canvas id="screen" data-status="idle" tabindex="0"></canvas></div>

  <!-- ONE wasm instance; archeRun merges every device host from portfolio.hosts.js (gfx + text + editor +
       screen + compiler). The compiler host runs arche-compile.wasm (WasiFS) + the compiled program (WasiShim)
       in-process; load wasi.js AFTER arche-web.js (both define a global WasiShim, the compiler host needs
       wasi.js's full one with .start()). -->
  <script src="analyzer/wasi-fs.js"></script>
  <script src="arche-web.js"></script>
  <script src="wasi.js"></script>
  <script src="portfolio.hosts.js"></script>
  <script>
    const app = document.getElementById("app");
    // Belt-and-braces for engines without `overflow: clip`: if anything ever manages to scroll the container
    // (focus-into-view on the off-screen playground <textarea> is the way it happens), snap it straight back.
    // A scrolled #app slides the <canvas> sideways, which reads as an invisible wall mid-screen.
    const unscroll = () => { if (app.scrollLeft || app.scrollTop) { app.scrollLeft = 0; app.scrollTop = 0; } };
    app.addEventListener("scroll", unscroll, { passive: true });
    addEventListener("scroll", () => { scrollTo(0, 0); }, { passive: true });
    archeRun("portfolio.wasm", { root: app });
  </script>
</body>
</html>
