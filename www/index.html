<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>curt reyes · portfolio</title>
  <style>
    html, body { margin: 0; height: 100%; background: #12131c; overflow: clip; }
    #app { position: relative; width: 100vw; height: 100vh; overflow: clip; }

    #screen  { display: block; position: absolute; inset: 0; width: 100vw; height: 100vh; z-index: 0; }
    #gfx-fg  { display: block; position: absolute; inset: 0; width: 100vw; height: 100vh; z-index: 3;
               pointer-events: none; }

    #text-layer { z-index: 1; }
    #text-layer span { pointer-events: none !important; }

    #ui-panel-2, #ui-panel-3, #ui-panel-4, #ui-panel-5, #ui-panel-6, #ui-panel-7, #ui-panel-8,
    #ui-panel-9, #ui-panel-10, #ui-panel-11, #ui-panel-12, #ui-panel-13, #ui-panel-14,
    #ui-panel-15, #ui-panel-16 { z-index: 60 !important; }
    #ui-textview-1, #ui-textview-2, #ui-textview-3, #ui-textview-4, #ui-textview-5, #ui-textview-6,
    #ui-textview-7, #ui-textview-8, #ui-textview-9, #ui-textview-10, #ui-textview-11 { z-index: 61 !important; }
    #ui-embed-0, #ui-embed-1, #ui-embed-2, #ui-embed-3 { z-index: 61 !important; }

    #ui-button-1, #ui-button-2, #ui-button-3 {
      background: #c8ccd8;
      border: 0.7vmin solid #949aad;
      border-radius: 12%;
      box-shadow: 0 1.5vmin 0 0 #949aad;
      opacity: 0.9;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #ui-button-1 { border-top-left-radius: 50%; border-bottom-left-radius: 50%; }
    #ui-button-2 { border-top-right-radius: 50%; border-bottom-right-radius: 50%; }

    #ui-button-1::before, #ui-button-2::before, #ui-button-3::before {
      content: "";
      display: block;
      width: 0;
      height: 0;
      border: 2.2vmin solid transparent;
    }
    #ui-button-1::before { border-right-color: #4a5068; margin-right: 2.2vmin; }
    #ui-button-2::before { border-left-color: #4a5068; margin-left: 2.2vmin; }
    #ui-button-3::before { border-bottom-color: #4a5068; margin-bottom: 2.2vmin; }

    #ui-button-1.is-down, #ui-button-2.is-down, #ui-button-3.is-down {
      background: #9aa0b2;
      box-shadow: none;
      transform: translateY(1.5vmin);
      filter: none;
    }
  </style>
</head>
<body>
  <div id="app"><canvas id="screen" data-status="idle" tabindex="0"></canvas></div>

  <script src="analyzer/wasi-fs.js"></script>
  <script src="arche-web.js"></script>
  <script src="wasi.js"></script>
  <script src="portfolio.hosts.js"></script>
  <script>
    const app = document.getElementById("app");
    const unscroll = () => { if (app.scrollLeft || app.scrollTop) { app.scrollLeft = 0; app.scrollTop = 0; } };
    app.addEventListener("scroll", unscroll, { passive: true });
    addEventListener("scroll", () => { scrollTo(0, 0); }, { passive: true });
    archeRun("portfolio.wasm", { root: app });
  </script>
</body>
</html>
